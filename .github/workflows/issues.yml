name: Issue Manager

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  auto-label:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Auto-label issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const labels = [];

            if (/bug|error|crash|broken|fix|fail|exception|throw/.test(text)) labels.push('bug');
            if (/feature|request|enhancement|add support|implement/.test(text)) labels.push('enhancement');
            if (/doc|readme|example|tutorial|typo/.test(text)) labels.push('documentation');
            if (/question|how to|help|usage|clarif/.test(text)) labels.push('question');
            if (/security|vulnerab|cve|xss|injection/.test(text)) labels.push('security');
            if (/push|notification|vapid|fcm|apns|service.worker/.test(text)) labels.push('push');
            if (/pubsub|channel|subscribe|publish|message/.test(text)) labels.push('pubsub');
            if (/presence|online|member|enter|leave/.test(text)) labels.push('presence');
            if (/history|replay|recover/.test(text)) labels.push('history');
            if (/reconnect|disconnect|connection|websocket/.test(text)) labels.push('connection');
            if (/cdn|browser|bundle|umd|esm|import/.test(text)) labels.push('bundling');
            if (/typescript|type|typing|\.d\.ts/.test(text)) labels.push('typescript');
            if (/support.chat|widget|embed/.test(text)) labels.push('support-chat');
            if (/urgent|critical|blocker|production|p0|asap/.test(text)) labels.push('priority: high');

            if (labels.length === 0) return;

            const colors = {
              bug: 'd73a4a', enhancement: 'a2eeef', documentation: '0075ca',
              question: 'd876e3', security: 'e4e669', push: 'f9d0c4',
              pubsub: 'bfdadc', presence: 'c5def5', history: 'fbca04',
              connection: 'b60205', bundling: 'fef2c0', typescript: '3178c6',
              'support-chat': 'cfd3d7', 'priority: high': 'b60205',
            };

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: colors[label] || 'ededed',
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, labels,
            });

  auto-respond:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/checkout@v4
      - name: Respond to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const text = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const author = issue.user.login;
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const v = pkg.version;
            let msg = '';

            if (/bug|error|crash|broken|fail|exception/.test(text)) {
              msg = [
                'Thanks for reporting this issue, @' + author + '! \uD83D\uDC1B',
                '',
                'To help us investigate faster, please include:',
                '- **SDK version**: `npm ls @wsocket-io/sdk` (latest is **v' + v + '**)',
                '- **Node.js / Browser version**',
                '- **Steps to reproduce**',
                '- **Expected vs actual behavior**',
                '- **Error message / stack trace**',
                '',
                'Try upgrading first: `npm install @wsocket-io/sdk@latest`',
              ].join('\n');
            } else if (/feature|request|enhancement|implement/.test(text)) {
              msg = [
                'Thanks for the feature request, @' + author + '! \u2728',
                '',
                'To help us prioritize:',
                '- **Use case**: What problem does this solve?',
                '- **API sketch**: How would you expect to use it?',
                '- **Workaround**: Is there a current workaround?',
                '',
                'Current version: **v' + v + '** | [Changelog](https://github.com/wsocket-io/sdk-js/releases)',
              ].join('\n');
            } else if (/question|how to|help|usage|clarif/.test(text)) {
              msg = [
                'Hi @' + author + '! \uD83D\uDC4B',
                '',
                'Here are some resources that might help:',
                '- [README & API Reference](https://github.com/wsocket-io/sdk-js#readme)',
                '- [npm package](https://www.npmjs.com/package/@wsocket-io/sdk)',
                '- [Documentation](https://docs.wsocket.io)',
                '- [Examples](https://examples.wsocket.io)',
                '',
                'Current SDK version: **v' + v + '**.',
              ].join('\n');
            } else if (/security|vulnerab|cve/.test(text)) {
              msg = [
                'Thanks for reporting this, @' + author + '. \uD83D\uDD12',
                '',
                'For security vulnerabilities, please report them privately via',
                '[GitHub Security Advisories](https://github.com/wsocket-io/sdk-js/security/advisories/new).',
              ].join('\n');
            } else {
              msg = [
                'Thanks for opening this issue, @' + author + '! \uD83D\uDC4B',
                '',
                'We will review it and get back to you.',
                'Make sure you are on the latest version (**v' + v + '**): `npm install @wsocket-io/sdk@latest`',
                '',
                '- [Documentation](https://github.com/wsocket-io/sdk-js#readme)',
                '- [Docs site](https://docs.wsocket.io)',
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, body: msg,
            });

  stale-check:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled'
    steps:
      - name: Auto-close if labeled wontfix
        uses: actions/github-script@v7
        if: contains(github.event.label.name, 'wontfix')
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed', state_reason: 'not_planned',
            });
